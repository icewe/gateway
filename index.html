<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记 + 待办清单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
    }
    .app-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 600px) {
      .app-container { grid-template-columns: 1fr; }
    }
    .panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .panel h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      border-color: #667eea;
    }
    button {
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    button:hover { background: #5568d3; }
    button.delete {
      background: #ff6b6b;
      padding: 6px 12px;
      font-size: 12px;
    }
    button.delete:hover { background: #ee5a5a; }
    
    /* Notes styles */
    #notes-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .note-item {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      position: relative;
    }
    .note-item textarea {
      width: 100%;
      border: none;
      background: transparent;
      resize: none;
      font-size: 14px;
      outline: none;
      min-height: 60px;
    }
    .note-item .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
    }
    
    /* Todo styles */
    #todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .todo-item.completed {
      opacity: 0.6;
    }
    .todo-item.completed span {
      text-decoration: line-through;
    }
    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    .todo-item span {
      flex: 1;
      font-size: 14px;
    }
    .empty-state {
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 笔记 + 待办清单</h1>
    <div class="app-container">
      <!-- Notes Panel -->
      <div class="panel">
        <h2>📋 笔记</h2>
        <div class="input-group">
          <input type="text" id="note-input" placeholder="添加新笔记..." onkeypress="handleNoteKeypress(event)">
          <button onclick="addNote()">添加</button>
        </div>
        <div id="notes-list">
          <div class="empty-state">暂无笔记</div>
        </div>
      </div>
      
      <!-- Todo Panel -->
      <div class="panel">
        <h2>✅ 待办事项</h2>
        <div class="input-group">
          <input type="text" id="todo-input" placeholder="添加新待办..." onkeypress="handleTodoKeypress(event)">
          <button onclick="addTodo()">添加</button>
        </div>
        <div id="todo-list">
          <div class="empty-state">暂无待办</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Data storage
    let notes = JSON.parse(localStorage.getItem('notes') || '[]');
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');

    // Notes functions
    function addNote() {
      const input = document.getElementById('note-input');
      const content = input.value.trim();
      if (content) {
        notes.unshift({ id: Date.now(), content });
        saveNotes();
        renderNotes();
        input.value = '';
      }
    }

    function updateNote(id, content) {
      const note = notes.find(n => n.id === id);
      if (note) {
        note.content = content;
        saveNotes();
      }
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      saveNotes();
      renderNotes();
    }

    function saveNotes() {
      localStorage.setItem('notes', JSON.stringify(notes));
    }

    function renderNotes() {
      const container = document.getElementById('notes-list');
      if (notes.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无笔记</div>';
        return;
      }
      container.innerHTML = notes.map(note => `
        <div class="note-item">
          <button class="delete delete-btn" onclick="deleteNote(${note.id})">删除</button>
          <textarea placeholder="编辑笔记..." onchange="updateNote(${note.id}, this.value)">${note.content}</textarea>
        </div>
      `).join('');
    }

    // Todo functions
    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (text) {
        todos.unshift({ id: Date.now(), text, completed: false });
        saveTodos();
        renderTodos();
        input.value = '';
      }
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.completed = !todo.completed;
        saveTodos();
        renderTodos();
      }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      saveTodos();
      renderTodos();
    }

    function saveTodos() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function renderTodos() {
      const container = document.getElementById('todo-list');
      if (todos.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无待办</div>';
        return;
      }
      container.innerHTML = todos.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''}">
          <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
          <span>${todo.text}</span>
          <button class="delete" onclick="deleteTodo(${todo.id})">删除</button>
        </div>
      `).join('');
    }

    // Keyboard handlers
    function handleNoteKeypress(e) {
      if (e.key === 'Enter') addNote();
    }
    function handleTodoKeypress(e) {
      if (e.key === 'Enter') addTodo();
    }

    // Initial render
    renderNotes();
    renderTodos();
  </script>
</body>
</html>
